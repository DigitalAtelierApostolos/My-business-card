<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ευχαριστούμε | Digital Atelier</title>
    <style>
        :root {
            --dark: #111111;
            --light: #ffffff;
            --gradient: linear-gradient(45deg, #7B5CFF, #27E3D5, #1F6BFF);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container { padding: 30px; max-width: 400px; width: 100%; }
        
        /* 1. Το Λογότυπο στην κορυφή */
        .logo-img {
            width: 100%;
            max-width: 250px; 
            height: auto;
            margin-bottom: 40px;
        }
        
        /* 2. Ο Τίτλος και το Τικ στην ίδια γραμμή */
        .message-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        h1 { 
            font-size: 2.2rem; 
            margin: 0;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        
        .tick {
            font-size: 2rem;
        }
        
        /* 3. Το Γενικό Κείμενο */
        p { 
            color: #aaa; 
            line-height: 1.6; 
            margin-bottom: 40px; 
            font-size: 1.1rem; 
        }
        
        .btn {
            display: block;
            padding: 16px 24px;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            background: var(--gradient);
            background-size: 200% 200%;
            transition: 0.4s;
            font-size: 1rem;
        }
        .btn:hover { transform: scale(1.03); }
    </style>
</head>
<body>
    <div class="container">
        <img src="DigitalAtelierLogo.png" alt="Digital Atelier Logo" class="logo-img">
        
        <div class="message-header">
            <h1>Ελήφθη!</h1>
            <span class="tick">✅</span>
        </div>
        
        <p>Ευχαριστώ για την επικοινωνία. <br> Θα λάβετε απάντηση <strong>εντός της επόμενης εργάσιμης ημέρας</strong>.</p>
        
        <a href="index.html" class="btn">Επιστροφή στην Κάρτα</a>
    </div>
</body>
</html>
