<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ευχαριστούμε | Digital Atelier</title>
    <style>
        :root {
            --dark: #111111;
            --light: #ffffff;
            --gradient: linear-gradient(45deg, #7B5CFF, #27E3D5, #1F6BFF);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container { padding: 20px; width: 100%; max-width: 400px; }
        
        /* Λογότυπο με το λευκό πλαίσιο ακέραιο */
        .logo-img {
            width: 100%;
            max-width: 320px; /* Ίδιο μέγεθος με το index.html */
            height: auto;
            margin-bottom: 25px;
        }
        
        /* Επαναφορά μεγέθους τίτλου όπως στο index.html */
        .message-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        h1 { 
            font-size: 1.5rem; /* Ίδιο με το όνομα στην κάρτα */
            margin: 0;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        
        .tick { font-size: 1.3rem; }
        
        /* Επαναφορά μεγέθους κειμένου */
        p { 
            color: #aaa; 
            line-height: 1.6; 
            margin-bottom: 30px; 
            font-size: 0.9rem; /* Πιο διακριτικό μέγεθος */
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 14px 24px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            background: var(--gradient);
            background-size: 200% 200%;
            transition: 0.4s;
            font-size: 0.95rem; /* Ίδιο μέγεθος με τα κουμπιά της κάρτας */
            box-sizing: border-box;
            border: none;
        }
        .btn:hover { transform: scale(1.03); }
    </style>
</head>
<body>
    <div class="container">
        <img src="DigitalAtelierLogo.png" alt="Digital Atelier Logo" class="logo-img">
        
        <div class="message-header">
            <h1>Σας ευχαριστούμε πολύ!</h1>
        </div>
        
        <p style="text-align: center; color: #aaa; line-height: 1.8; font-size: 0.9rem; padding: 0 10px;">
            Λάβαμε το μήνυμά σας και θα επικοινωνήσουμε μαζί σας το συντομότερο δυνατό.
            <br><br> 
            Στο μεταξύ, μπορείτε να δείτε τη δουλειά μας στο 
            <a href="https://www.instagram.com/youridentityonline/" target="_blank" style="color: white; text-decoration: none; font-weight: bold;">@youridentityonline</a> 
            ή να κατεβάσετε τα 
            <a href="contact.vcf" download style="color: white; text-decoration: none; font-weight: bold;">στοιχεία επικοινωνίας (vCard)</a> 
            απευθείας στο κινητό σας.
        </p>
        
        <a href="index.html" class="btn">Επιστροφή στην Αρχική</a>
    </div>
</body>
</html>
