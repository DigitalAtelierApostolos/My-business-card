<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ευχαριστούμε | Digital Atelier</title>
    <style>
        :root {
            --dark: #111111;
            --light: #ffffff;
            --gradient: linear-gradient(45deg, #7B5CFF, #27E3D5, #1F6BFF);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container { padding: 30px; max-width: 400px; }
        
        .icon { font-size: 50px; margin-bottom: 20px; }
        
        h1 { 
            font-size: 2rem; 
            margin-bottom: 15px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        p { color: #aaa; line-height: 1.6; margin-bottom: 30px; font-size: 1rem; }
        
        .btn {
            display: block;
            padding: 14px 24px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            background: var(--gradient);
            background-size: 200% 200%;
            transition: 0.4s;
        }
        .btn:hover { transform: scale(1.03); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✅</div>
        <h1>Ελήφθη!</h1>
        <p>Ευχαριστώ για την επικοινωνία. <br> Θα λάβετε απάντηση στο email σας <strong>εντός της επόμενης εργάσιμης ημέρας</strong>.</p>
        <a href="index.html" class="btn">Επιστροφή στην Κάρτα</a>
    </div>
</body>
</html>
