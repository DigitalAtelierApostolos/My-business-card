<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Card | Under Construction</title>
    <style>
        :root {
            --primary: #0070f3; /* Ένα κλασικό tech blue */
            --dark: #111111;
            --light: #ffffff;
            --gradient: linear-gradient(45deg, #7B5CFF, #27E3D5, #1F6BFF);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
     
        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        p { font-size: 0.6rem; color: white; margin-bottom: 30px; }
        
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }

        /* Κρυφή Φόρμα και Animation */
        #contact-section {
            display: none; /* Αρχικά κρυφό */
            margin-top: 20px;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(-10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .input-field {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #222;
            color: white;
            font-size: 0.9rem;
            box-sizing: border-box;
        }
        .gdpr-text { 
            font-size: 0.7rem; 
            color: #aaa; 
            line-height: 1.4; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: flex-start; 
            gap: 10px;
        }
        .gdpr-text input { margin-top: 3px; }
        
        .contact-info {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>
    
    <div class="container" style="text-align: center; padding: 20px;">
      <img src="DigitalAtelierLogo.png" alt="Digital Atelier Logo" style="width: 350px; margin-bottom: 20px;">

       <h1 style="margin-bottom: 5px;">Απόστολος Παπαναστασίου</h1>
        <p style="font-size: 0.8rem; font-weight: bold; color: white; margin-bottom: 25px; margin-top: 0;">Digital Growth Engineer</p>
        <p style="font-size: 0.6rem; color: white; margin-bottom: 30px;">Web & Digital Management</p>
        
            <div class="actions" style="margin-top: 20px;">
                <a href="contact.vcf" download class="btn" style="display: block; margin-bottom: 15px; border: none; background: linear-gradient(45deg, #7B5CFF, #27E3D5, #1F6BFF); background-size: 200% 200%; transition: 0.5s;">
                📥 Αποθήκευση Επαφής </a>
    
                <a href="https://www.instagram.com/youridentityonline/" target="_blank" class="btn" style="display: block; border: none; background: linear-gradient(45deg, #7B5CFF, #27E3D5, #1F6BFF); background-size: 200% 200%; transition: 0.5s;">
                Συνδεθείτε στο Instagram </a>

                <button onclick="toggleForm()" class="btn" style="display: block; width: 100%; margin-bottom: 15px; border: none; background: var(--gradient); background-size: 200% 200%; transition: 0.5s; cursor: pointer;">
                🤝 Εκδήλωση Ενδιαφέροντος </button>
            </div>

            <div id="contact-section">
            <form name="interest-form" method="POST" data-netlify="true">
                <input type="text" name="name" placeholder="Ονοματεπώνυμο" class="input-field" required>
                <input type="email" name="email" placeholder="Email (π.χ. name@example.com)" class="input-field" required title="Παρακαλώ εισάγετε ένα έγκυρο email">
                <textarea name="message" placeholder="Πώς μπορώ να σας βοηθήσω;" class="input-field" style="height: 100px;" required></textarea>
                
                <label class="gdpr-text">
                    <input type="checkbox" required> 
                    <span>Συμφωνώ με την επεξεργασία των δεδομένων μου για την επικοινωνία μαζί μου (GDPR).</span>
                </label>
                
                <button type="submit" class="btn" style="margin-bottom: 0; width: 100%;">Αποστολή</button>
            </form>
        </div>
        
        <div class="contact-info">
            <p>Email: info@digitalatelier.gr</p>
        </div>
    </div>

        <script>
            function toggleForm() {
                var section = document.getElementById("contact-section");
                if (section.style.display === "block") {
                    section.style.display = "none";
                } else {
                    section.style.display = "block";
                    section.scrollIntoView({ behavior: 'smooth' }); // Αυτόματο σκρολάρισμα στη φόρμα
                }
            }
        </script>
    
</body>

</html>
