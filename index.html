<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Card | Απόστολος Παπαναστασίου</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> <!-- instagram logo --> 
    <style>
        :root {
            --primary: #0070f3; /* Ένα κλασικό tech blue */
            --dark: #111111;
            --light: #ffffff;
            --gradient: linear-gradient(45deg, #7B5CFF, #27E3D5, #1F6BFF);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 20px;
            width: 100%;
            max-width: 400px;
        }
     
        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        .subtitle { font-size: 0.8rem; font-weight: bold; color: white; margin-bottom: 25px; margin-top: 0; }
        .tagline { font-size: 0.6rem; color: white; margin-bottom: 30px; }
        
        .btn {
          display: flex;
            align-items: center; 
            justify-content: center; 
            text-align: center;
            width: 100%;
            min-height: 55px; /* Δίνει σταθερό ύψος για να μην "κουνιέται" το κείμενο */
            padding: 14px 24px;
            margin-bottom: 15px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700 !important; /* Επιβολή ίδιου πάχους */
            font-family: inherit;
            border: none;
            background: var(--gradient);
            background-size: 200% 200%;
            transition: transform 0.5s;
            cursor: pointer;
            box-sizing: border-box;
            font-size: 0.95rem;
            position: relative;
        }

        /* Για να έχουν τα εικονίδια πάντα λίγο χώρο από το κείμενο */
        .btn i, .btn span {
            margin-right: 10px;
            display: inline-flex;
            align-items: center;
        }
        
        .btn:hover { transform: scale(1.05); }

        /* Κρυφή Φόρμα και Animation */
        #contact-section {
            display: none; /* Αρχικά κρυφό */
            margin-top: 35px;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(-10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .input-field {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #222;
            color: white;
            font-size: 0.9rem;
            box-sizing: border-box;
        }
        .gdpr-text { 
            font-size: 0.7rem; 
            color: #aaa; 
            line-height: 1.4; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: flex-start; 
            gap: 10px;
        }
        .gdpr-text input { margin-top: 3px; }
        
        .contact-info {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #666;
        }

        /* Διόρθωση για το Logo να μην "σπάει" σε μικρά κινητά */
        .logo-img {
            width: 100%;
            max-width: 320px; /* Ιδανικό μέγεθος για mobile */
            height: auto;
            margin-bottom: 20px;
        }

        /* Gradient για το εικονίδιο Instagram */
        .fa-instagram {
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            margin-right: 8px;
            font-size: 1.1rem;
            vertical-align: middle;
        }
        
    </style>
</head>
<body>
    
    <div class="container">
      <img src="DigitalAtelierLogo.png" alt="Digital Atelier Logo" class="logo-img">

       <h1>Απόστολος Παπαναστασίου</h1>
        <p class="subtitle">Digital Growth Engineer</p>
        <p class="tagline">Web & Digital Management</p>
        
            <div class="actions" style="margin-top: 20px;">
                <button onclick="toggleForm()" class="btn">
                🤝 Εκδήλωση Ενδιαφέροντος </button>
    
                <a href="https://www.instagram.com/youridentityonline/" target="_blank" class="btn">
                <i class="fab fa-instagram"></i> Ακολουθήστε στο Instagram </a>
                
                <a href="contact.vcf" download class="btn">
                📥 Αποθήκευση στοιχείων επικοινωνίας (vCard) </a>
            </div>

            <div id="contact-section">
            <form name="interest-form" method="POST" data-netlify="true" action="/success">
                <input type="text" name="name" placeholder="Ονοματεπώνυμο" class="input-field" required>
                <input type="email" name="email" placeholder="Email (π.χ. name@example.com)" class="input-field" required title="Παρακαλώ εισάγετε ένα έγκυρο email">
                <input type="tel" name="phone" placeholder="Τηλέφωνο (προαιρετικό)" class="input-field">
                <textarea name="message" placeholder="Πώς μπορώ να σας βοηθήσω;" class="input-field" style="height: 100px;" required></textarea>
                
                <label class="gdpr-text">
                    <input type="checkbox" required> 
                    <span>Συμφωνώ με την επεξεργασία των δεδομένων μου για την επικοινωνία μαζί μου (GDPR).</span>
                </label>
                
                <button type="submit" class="btn" style="margin-top: 15px; margin-bottom: 0; width: 100%; border: none; background: var(--gradient); background-size: 200% 200%; cursor: pointer;">Αποστολή</button>
            </form>
        </div>
        
        <div class="contact-info">
            <p>Email: info@digitalatelier.gr</p>
            <p>*(vCard): Ασφαλές αρχείο για αυτόματη προσθήκη των στοιχείων επικοινωνίας στις επαφές σας</p>
        </div>
    </div>

        <script>
            function toggleForm() {
                var section = document.getElementById("contact-section");
                if (section.style.display === "block") {
                    section.style.display = "none";
                } else {
                    section.style.display = "block";
                    section.scrollIntoView({ behavior: 'smooth' }); // Αυτόματο σκρολάρισμα στη φόρμα
                }
            }
        </script>
    
</body>

</html>
